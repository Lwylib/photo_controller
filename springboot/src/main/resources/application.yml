server:
  address: 0.0.0.0   # 允许局域网访问
  port: 9090

# 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/photo_controller?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# 配置mybatis实体和xml映射
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

fileBaseUrl: http://localhost:${server.port}

# ComfyUI 生图服务配置
comfyui:
  base-url: http://127.0.0.1:8188
  timeout: 2000
  poll-interval: 2
  output-path: ai-gen-picture

# AI 模型配置
ai:
  model:
    provider: deepseek
    api-key: api-key
    model-name: deepseek-v4-flash
    base-url: http://localhost:11434
    max-tokens: 2048
    temperature: 0.7
    max-history-messages: 20
    system-prompt: 你是一个专业、友好的 AI 助手，请用中文回答问题。
